{% extends 'base.html' %}
{% block title %}Mon Profil Médecin{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold text-gray-800 mb-6"><i class="fas fa-user-md mr-2 text-sky-500"></i>Mon Profil Médecin</h1>
    <div class="card">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn-primary">
                <i class="fas fa-save mr-2"></i>Sauvegarder
            </button>
        </form>
    </div>
</div>
{% endblock %}
