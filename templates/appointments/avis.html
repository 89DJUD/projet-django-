{% extends 'base.html' %}
{% block title %}Donner un avis{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold text-gray-800 mb-3">
        <i class="fas fa-star mr-2 text-yellow-400"></i>Votre avis
    </h1>
    <p class="text-gray-600 mb-6">Consultation avec {{ rdv.medecin }} le {{ rdv.date }}</p>
    <div class="card">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}
            <button type="submit" class="btn-primary">
                <i class="fas fa-paper-plane mr-2"></i>Envoyer mon avis
            </button>
        </form>
    </div>
</div>
{% endblock %}
