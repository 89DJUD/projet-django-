{% extends 'base.html' %}
{% block title %}Confirmer l'annulation{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16 text-center">
    <div class="card">
        <i class="fas fa-exclamation-triangle text-yellow-400 text-5xl mb-4"></i>
        <h1 class="text-2xl font-bold text-gray-800 mb-3">Annuler ce rendez-vous ?</h1>
        <p class="text-gray-600 mb-2">Vous allez annuler votre rendez-vous avec :</p>
        <p class="font-semibold text-gray-800">{{ rdv.medecin }}</p>
        <p class="text-sky-500">{{ rdv.date }} à {{ rdv.heure|time:"H:i" }}</p>
        <div class="flex gap-3 mt-6 justify-center">
            <a href="{% url 'appointments:mes_rdv' %}" class="btn-secondary">Non, garder</a>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="bg-red-500 hover:bg-red-600 text-white font-semibold py-2 px-6 rounded-lg">
                    Oui, annuler
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
